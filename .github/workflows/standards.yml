# lab-os self-caller — invokes all three reusable CI workflows against
# lab-os itself on every pull request.
#
# This file also serves as the copy-paste template for phase-2 callers in
# other lab repos (see the "Downstream repo example" comment block below).
#
# Reusable workflows handle all checkouts (caller repo + lab-os script
# source) internally; this caller does NOT need any explicit checkout steps.

name: standards

on:
  pull_request:

permissions:
  contents: read

jobs:
  log-lint:
    uses: ./.github/workflows/log-lint.yml
    # No `with:` needed — defaults (project_log.md / project_log_archive.md)
    # are correct for lab-os.

  docs-budget:
    uses: ./.github/workflows/docs-budget.yml
    with:
      # enforce: true — flipped 2026-06-10 after this repo's first green run,
      # per the §7.2 warn-only-until-first-green posture.
      enforce: true

  merge-bar-check:
    uses: ./.github/workflows/merge-bar-check.yml
    # No `with:` needed — default exclude-globs ("*.md,docs/**,.github/**")
    # are correct for lab-os.

